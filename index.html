<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美邮购报价计算器 V3.3</title>
<style>
*{box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  margin:0;
  padding:14px;
  background:linear-gradient(180deg,#eef5ff,#f8fafc);
  color:#111;
}
.card{
  max-width:520px;
  margin:auto;
  background:#fff;
  border-radius:24px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.header{
  text-align:center;
  margin-bottom:16px;
}
h1{
  font-size:24px;
  margin:0;
  color:#0047b3;
}
.sub{
  font-size:13px;
  color:#666;
  margin-top:4px;
}
label{
  display:block;
  font-weight:800;
  margin-top:13px;
  margin-bottom:6px;
  font-size:15px;
}
select,input{
  width:100%;
  font-size:20px;
  padding:13px;
  border:1px solid #d4d9e2;
  border-radius:14px;
  background:#fff;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.rateGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:8px;
}
.rateBtn{
  font-size:19px;
  padding:12px 0;
  border-radius:999px;
  border:1px solid #0057d9;
  background:#eef5ff;
  color:#0057d9;
  font-weight:900;
}
.rateBtn.active{
  background:#0057d9;
  color:white;
}
.result{
  margin-top:18px;
  padding:18px;
  border-radius:22px;
  background:linear-gradient(180deg,#eef5ff,#ffffff);
  border:1px solid #c9ddff;
  text-align:center;
}
.resultTitle{
  font-size:15px;
  color:#555;
}
.big{
  font-size:52px;
  line-height:1.1;
  font-weight:950;
  color:#d90000;
  margin:8px 0 12px;
}
.usd{
  font-size:24px;
  font-weight:900;
  color:#0047b3;
  margin-bottom:10px;
}
.details{
  margin-top:12px;
  text-align:left;
}
.row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #e3ebf8;
  padding:9px 0;
  font-size:15px;
}
.row:last-child{border-bottom:0}
button.main{
  width:100%;
  margin-top:16px;
  font-size:21px;
  padding:15px;
  border:0;
  border-radius:16px;
  background:#0057d9;
  color:white;
  font-weight:900;
}
button.secondary{
  width:100%;
  margin-top:10px;
  font-size:19px;
  padding:14px;
  border:0;
  border-radius:16px;
  background:#222;
  color:white;
  font-weight:900;
}
.note{
  font-size:12px;
  color:#666;
  margin-top:12px;
  line-height:1.5;
}
@media(max-width:390px){
  .big{font-size:46px}
  select,input{font-size:18px}
}
</style>
</head>

<body>
<div class="card">
  <div class="header">
    <h1>美邮购报价计算器</h1>
    <div class="sub">Beauty Ship Express · V3.3</div>
  </div>

  <label>线路</label>
  <select id="line" onchange="calc()">
    <option value="A">A 食品/保健品/奶粉 $7.00/lb</option>
    <option value="B">B 普货/日用品/衣服 $7.00/lb</option>
    <option value="C">C 二线护肤/鞋子/衣服/饰品 $9.00/lb</option>
    <option value="C1">C1 二线包包 $12.00/lb</option>
    <option value="D">D 液体水奶 $6.00/lb</option>
    <option value="E">E 普通鞋类 $7.50/lb</option>
    <option value="H">H 电子产品/胃药 $9.50/lb</option>
    <option value="W">W 普通手表 $10.00/lb</option>
    <option value="U">U 回国行李 $7.50/lb</option>
  </select>

  <div class="grid">
    <div>
      <label>重量 lb</label>
      <input id="weight" type="number" inputmode="decimal" step="0.1" placeholder="5.2" oninput="calc()">
    </div>
    <div>
      <label>商品价值 $</label>
      <input id="value" type="number" inputmode="decimal" step="0.01" value="0" oninput="calc()">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>固定利润 $</label>
      <input id="profitUsd" type="number" inputmode="decimal" step="0.01" value="0" oninput="calc()">
    </div>
    <div>
      <label>固定利润 ¥</label>
      <input id="profitRmb" type="number" inputmode="decimal" step="0.1" value="0" oninput="calc()">
    </div>
  </div>

  <label>操作费 $</label>
  <input id="fee" type="number" inputmode="decimal" step="0.01" value="0" oninput="calc()">

  <label>汇率</label>
  <input id="ex" type="number" inputmode="decimal" step="0.1" value="7.0" oninput="manualRate()">

  <div class="rateGrid">
    <button class="rateBtn" type="button" onclick="setRate(6.8)">6.8</button>
    <button class="rateBtn" type="button" onclick="setRate(6.9)">6.9</button>
    <button class="rateBtn" type="button" onclick="setRate(7.0)">7.0</button>
    <button class="rateBtn" type="button" onclick="setRate(7.1)">7.1</button>
  </div>

  <button class="main" onclick="calc()">计算报价</button>

  <div class="result">
    <div class="resultTitle">人民币总价</div>
    <div class="big" id="rmb">¥0.0</div>

    <div class="resultTitle">美元总价</div>
    <div class="usd" id="usd">$0.0</div>

    <div class="details">
      <div class="row"><span>实际重量</span><strong id="actual">0 lb</strong></div>
      <div class="row"><span>计费重量</span><strong id="bill">0 lb</strong></div>
      <div class="row"><span>国际运费</span><strong id="ship">$0.0</strong></div>
      <div class="row"><span>商品价值</span><strong id="valueOut">$0.0</strong></div>
      <div class="row"><span>固定利润 $</span><strong id="profitUsdOut">$0.0</strong></div>
      <div class="row"><span>固定利润 ¥</span><strong id="profitRmbOut">¥0.0</strong></div>
      <div class="row"><span>操作费</span><strong id="feeOut">$0.0</strong></div>
      <div class="row"><span>当前汇率</span><strong id="exOut">7.0</strong></div>
    </div>
  </div>

  <button class="main" onclick="copyTotal()">复制总价</button>
  <button class="secondary" onclick="copyDetail()">复制明细</button>

  <div class="note">
    规则：全部进位整磅；W线2磅起，U线30磅起。<br>
    公式：人民币总价 =（国际运费 + 商品价值 + 操作费 + 固定利润$）× 汇率 + 固定利润¥。
  </div>
</div>

<script>
const lines={
A:["A 食品/保健品/奶粉",7,1],
B:["B 普货/日用品/衣服",7,1],
C:["C 二线护肤/鞋子/衣服/饰品",9,1],
C1:["C1 二线包包",12,1],
D:["D 液体水奶",6,1],
E:["E 普通鞋类",7.5,1],
H:["H 电子产品/胃药",9.5,1],
W:["W 普通手表",10,2],
U:["U 回国行李",7.5,30]
};

function n(id){
  return parseFloat(document.getElementById(id).value)||0;
}
function usd1(x){
  return "$"+Number(x||0).toFixed(1);
}
function rmb1(x){
  return "¥"+Number(x||0).toFixed(1);
}
function ex1(x){
  return Number(x||0).toFixed(1);
}

function getData(){
  let key=document.getElementById("line").value;
  let line=lines[key];

  let weight=n("weight");
  let value=n("value");
  let fee=n("fee");
  let profitUsd=n("profitUsd");
  let profitRmb=n("profitRmb");
  let ex=n("ex");

  let bill=weight>0?Math.max(Math.ceil(weight),line[2]):0;
  let ship=bill*line[1];

  let totalUsd=ship+value+fee+profitUsd;
  let totalRmb=totalUsd*ex+profitRmb;

  return {
    key,
    name:line[0],
    rate:line[1],
    weight,
    value,
    fee,
    profitUsd,
    profitRmb,
    ex,
    bill,
    ship,
    totalUsd,
    totalRmb
  };
}

function updateRateButtons(){
  let current=ex1(n("ex"));
  document.querySelectorAll(".rateBtn").forEach(btn=>{
    btn.classList.toggle("active",ex1(parseFloat(btn.innerText))===current);
  });
}

function setRate(v){
  document.getElementById("ex").value=ex1(v);
  calc();
}

function manualRate(){
  document.getElementById("ex").value=ex1(n("ex"));
  calc();
}

function calc(){
  let d=getData();

  localStorage.setItem("beauty_fee_v33",d.fee);
  localStorage.setItem("beauty_profitUsd_v33",d.profitUsd);
  localStorage.setItem("beauty_profitRmb_v33",d.profitRmb);
  localStorage.setItem("beauty_ex_v33",ex1(d.ex));

  document.getElementById("rmb").innerText=rmb1(d.totalRmb);
  document.getElementById("usd").innerText=usd1(d.totalUsd);
  document.getElementById("actual").innerText=d.weight+" lb";
  document.getElementById("bill").innerText=d.bill+" lb";
  document.getElementById("ship").innerText=usd1(d.ship);
  document.getElementById("valueOut").innerText=usd1(d.value);
  document.getElementById("feeOut").innerText=usd1(d.fee);
  document.getElementById("profitUsdOut").innerText=usd1(d.profitUsd);
  document.getElementById("profitRmbOut").innerText=rmb1(d.profitRmb);
  document.getElementById("exOut").innerText=ex1(d.ex);

  updateRateButtons();
  return d;
}

function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>alert("已复制"));
  }else{
    prompt("复制以下内容：",t);
  }
}

function copyTotal(){
  let d=calc();
  copyText(rmb1(d.totalRmb));
}

function copyDetail(){
  let d=calc();

  let text=`Beauty Ship Express 美邮购
线路：${d.name}
实际重量：${d.weight} lb
计费重量：${d.bill} lb

国际运费：${usd1(d.ship)}
商品价值：${usd1(d.value)}
固定利润：${usd1(d.profitUsd)}
人民币利润：${rmb1(d.profitRmb)}
操作费：${usd1(d.fee)}

美元总价：${usd1(d.totalUsd)}
汇率：${ex1(d.ex)}
人民币应付：${rmb1(d.totalRmb)}`;

  copyText(text);
}

window.onload=function(){
  if(localStorage.getItem("beauty_fee_v33")){
    document.getElementById("fee").value=localStorage.getItem("beauty_fee_v33");
  }
  if(localStorage.getItem("beauty_profitUsd_v33")){
    document.getElementById("profitUsd").value=localStorage.getItem("beauty_profitUsd_v33");
  }
  if(localStorage.getItem("beauty_profitRmb_v33")){
    document.getElementById("profitRmb").value=localStorage.getItem("beauty_profitRmb_v33");
  }
  if(localStorage.getItem("beauty_ex_v33")){
    document.getElementById("ex").value=localStorage.getItem("beauty_ex_v33");
  }
  calc();
}
</script>
</body>
</html>
